{% extends 'base.html' %}

{% block title %}Удаление категории{% endblock %}

{% block content %}
    <div style="text-align: center; padding: 40px 0;">
        <h2 style="color: #d63031; margin-bottom: 20px;">Удаление категории</h2>
        
        <p style="font-size: 18px; margin-bottom: 30px;">
            Вы уверены, что хотите удалить категорию <strong>«{{ category.title }}»</strong>? 
            <br>Внимание: это действие нельзя отменить!
        </p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn" style="background: #d63031; color: white; margin-right: 15px;">
                Да, удалить
            </button>
            <a href="{% url 'categories-list' %}" class="btn btn-secondary">
                Отмена
            </a>
        </form>
    </div>
{% endblock %}
