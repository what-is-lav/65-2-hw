{% extends 'base.html' %}

{% block content %}
    <h2>Мои посты</h2>
    {% for post in posts %}
        <div class="post-card">
            <h3>{{ post.title }}</h3>
            <p>{{ post.content|truncatewords:20 }}</p>
            
            <a href="{% url 'post_edit' post.pk %}" class="btn btn-secondary">✏️ Редактировать</a>
            <a href="{% url 'post_delete' post.pk %}" class="btn" style="background: #e74c3c; color: white;">🗑 Удалить</a>
        </div>
    {% empty %}
        <p>У вас еще нет постов.</p>
    {% endfor %}
{% endblock %}
