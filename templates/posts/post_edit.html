{% extends 'base.html' %}

{% block title %}Редактировать пост{% endblock %}

{% block content %}
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">Редактировать пост</h2>
        <a href="{% url 'my_posts' %}" class="btn btn-secondary" style="font-size: 14px; padding: 6px 12px;">Назад</a>
    </div>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        {% for field in form %}
            <div style="margin-bottom: 20px;">
                <label style="font-weight: 600; display: block; margin-bottom: 5px; color: #2d3436;">
                    {{ field.label }}
                </label>
                
                {{ field }}
                
                {% if field.errors %}
                    <div style="color: #d63031; font-size: 14px; font-weight: 600; margin-top: -15px; margin-bottom: 15px;">
                        {{ field.errors.0 }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
        
        <div style="margin-top: 30px;">
            <button type="submit" class="btn btn-success">Сохранить изменения</button>
        </div>
    </form>
{% endblock %}
