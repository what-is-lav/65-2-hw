{% extends 'base.html' %}

{% block title %}Удаление поста{% endblock %}

{% block content %}
    <div style="text-align: center; padding: 40px 0;">
        <h2 style="color: #d63031; margin-bottom: 20px;">Удаление поста</h2>
        
        <p style="font-size: 18px; margin-bottom: 30px;">
            Вы уверены, что хотите навсегда удалить пост <strong>«{{ post.title }}»</strong>? 
            <br>Это действие нельзя будет отменить.
        </p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn" style="background: #d63031; color: white; margin-right: 15px;">
                Да, удалить
            </button>
            <a href="{% url 'my_posts' %}" class="btn btn-secondary">
                Отмена
            </a>
        </form>
    </div>
{% endblock %}
