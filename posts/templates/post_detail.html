<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Блог</title>
</head>
<body>
    <h1>Список постов</h1>
    <div style="display: flex;">
        <aside style="width: 25%; padding-right: 20px;">
            <h3>Категории</h3>
            <ul>
                {% for category in categories %}
                    <li>{{ category.title }}</li>
                {% empty %}
                    <li>Нет доступных категорий</li>
                {% endfor %}
            </ul>
        </aside>
        <main style="width: 75%;">
            <h3>Посты</h3>
            {% for post in posts %}
                <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
                    <h4><a href="{% url 'post-detail' post.pk %}">{{ post.title }}</a></h4>
                    <p>Рейтинг: {{ post.rate }}</p>
                </div>
            {% empty %}
                <p>Постов пока нет.</p>
            {% endfor %}
        </main>
    </div>
</body>
</html>
